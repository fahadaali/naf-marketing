name = "naf-marketing"
main = "src/index.ts"
compatibility_date = "2024-06-01"
compatibility_flags = ["nodejs_compat"]

# يخدم هذا الـ Worker واجهة React (assets) بالإضافة إلى الـ API عبر Hono
[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# قاعدة بيانات D1
[[d1_databases]]
binding = "DB"
database_name = "naf_marketing"
database_id = "4ab835ee-5c3d-477f-be4b-9def4f49e06a"
migrations_dir = "migrations"

# تخزين الوسائط R2
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "naf-marketing-media"

# المهام المجدولة:
#   "17 * * * *" جلب RSS وسحب التحليلات (كل ساعة).
#   "0 18 * * 6" التقرير الأسبوعي (السبت ٩:٠٠م بتوقيت الرياض) يُرفع إلى بيسكامب.
# النشر لم يعد تلقائياً — يتم يدوياً بالضغط على «نشر الآن»، ومن يفوت موعده يظهر «متأخر».
[triggers]
crons = ["17 * * * *", "0 18 * * 6"]

# متغيّرات غير سرية (يمكن تعديلها). المفاتيح السرية عبر: wrangler secret put
[vars]
APP_TIMEZONE = "Asia/Riyadh"
APP_NAME = "منصة ناف للتسويق"

# المفاتيح السرية تُضبط عبر Secrets ولا تُخزَّن هنا:
#   wrangler secret put CLAUDE_API_KEY
#   wrangler secret put PROVIDER_API_KEY
#   wrangler secret put AUTH_SECRET
